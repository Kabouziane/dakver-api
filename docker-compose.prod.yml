# Environnement de PRODUCTION
# Usage : docker compose -f docker-compose.prod.yml up -d
# Nginx + Gunicorn + Postgres + Certbot SSL

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "python manage.py migrate --settings=config.settings.prod &&
             python manage.py collectstatic --noinput --settings=config.settings.prod &&
             gunicorn config.wsgi:application
               --bind 0.0.0.0:8000
               --workers 3
               --timeout 120
               --access-logfile -
               --error-logfile -"
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DB_HOST: db
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Obtenir le certificat la première fois :
    # docker compose -f docker-compose.prod.yml run --rm certbot certonly \
    #   --webroot --webroot-path=/var/www/certbot \
    #   -d api.toitureverte.be --email info@toitureverte.be --agree-tos
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot;
               sleep 12h;
             done"

volumes:
  pgdata:
  static:
  media:
  certbot_conf:
  certbot_www:
